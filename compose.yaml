services:
  database:
    image: postgres:17.5-alpine
    container_name: auth-database
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql/data

volumes:
  data:
    driver: local
    driver_opts:
      type: none
      device: ./data
      o: bind
